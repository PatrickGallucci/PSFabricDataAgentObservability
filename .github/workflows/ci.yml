name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Validate module (pwsh ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4

      - name: Install analysis & test tooling
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester          -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22.0 -Force -Scope CurrentUser

      - name: Test-ModuleManifest
        shell: pwsh
        run: |
          $m = Test-ModuleManifest ./FabricDataAgentObservability.psd1
          "Manifest OK: $($m.Name) v$($m.Version)"

      - name: PSScriptAnalyzer (fail on Error)
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $issues | Sort-Object Severity, ScriptName, Line | Format-Table -AutoSize | Out-String | Write-Host
          $errors = @($issues | Where-Object Severity -eq 'Error')
          if ($errors.Count) { throw "ScriptAnalyzer found $($errors.Count) error(s)." }

      - name: Invoke-Pester
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $cfg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results-${{ matrix.os }}
          path: testResults.xml
          if-no-files-found: ignore
